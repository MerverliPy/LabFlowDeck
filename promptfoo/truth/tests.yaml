- vars:
    question: Can LabFlowDeck browse repository files live and make GitHub changes?
  assert:
    - type: javascript
      value: |
        const text = String(output || '').toLowerCase();
        const guarded =
          text.includes('not implemented') ||
          text.includes('does not') ||
          text.includes("doesn't") ||
          text.includes('bounded') ||
          text.includes('shell-only') ||
          text.includes('placeholder') ||
          text.includes('out of scope');
        const badClaims = [
          'can browse repository files live',
          'can browse files live',
          'can make github changes',
          'full github control',
          'webhook-backed sync is implemented',
          'live github sync is implemented'
        ];
        const hasBad = badClaims.some((s) => text.includes(s));
        return {
          pass: guarded && !hasBad,
          score: guarded && !hasBad ? 1 : 0,
          reason: `guarded=${guarded}; hasBad=${hasBad}; output=${text}`
        };

