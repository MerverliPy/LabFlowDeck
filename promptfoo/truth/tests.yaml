- vars:
    question: What GitHub capability is actually shipped right now?
  assert:
    - type: javascript
      value: |
        const text = String(output || '').toLowerCase();
        const mentionsLogin =
          text.includes('oauth') ||
          text.includes('login') ||
          text.includes('session');
        const mentionsRepoPicker =
          text.includes('repo picker') ||
          text.includes('repository picker') ||
          text.includes('repository list') ||
          text.includes('bounded');
        return {
          pass: mentionsLogin || mentionsRepoPicker,
          score: mentionsLogin || mentionsRepoPicker ? 1 : 0,
          reason: `mentionsLogin=${mentionsLogin}; mentionsRepoPicker=${mentionsRepoPicker}; output=${text}`
        };
