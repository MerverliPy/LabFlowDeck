name: Release Label Guard

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - labeled
      - unlabeled
      - ready_for_review

permissions:
  contents: read
  pull-requests: read

jobs:
  guard:
    if: github.event.pull_request.base.ref == 'main'
    runs-on: ubuntu-latest

    steps:
      - name: Require exactly one release label
        uses: actions/github-script@v9
        with:
          script: |
            const labels = (context.payload.pull_request.labels || []).map((label) => label.name);
            const releaseLabels = ['semver:major', 'semver:minor', 'semver:patch', 'skip-changelog'];
            const matched = labels.filter((label) => releaseLabels.includes(label));

            if (matched.length !== 1) {
              core.setFailed(
                'Add exactly one release label before merge: semver:major, semver:minor, semver:patch, or skip-changelog.'
              );
              return;
            }

            core.notice(`Release label check passed with ${matched[0]}.`);
