name: Web CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: web-ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  web:
    name: Lint, test, typecheck, and build web
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.8.1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint web app
        run: pnpm lint:web

      - name: Run web tests
        run: pnpm test:web

      - name: Typecheck web app
        run: pnpm typecheck:web

      - name: Build web app
        run: pnpm build:web
