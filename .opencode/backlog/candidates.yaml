selection_order:
  - explicit_user_scope
  - highest_priority
  - same_module_followup
  - smallest_safe_scope
  - clearest_validation

constraints:
  max_files_changed: 6
  prefer_single_module: true
  avoid_generic_tasks: true

status_rules:
  ineligible_statuses:
    - completed

candidates:
  - id: patch-nextjs-security-line
    title: Patch the Next.js release line and record post-patch operator guidance
    status: completed
    completion_note: Updated to a patched Next.js 15.x release, regenerated the lockfile, and passed the web build.
    module: apps/web
    priority: 100
    files:
      - apps/web/package.json
      - pnpm-lock.yaml
      - README.md
      - .opencode/plans/current-phase.md
    validation: |
      node -p "require('./apps/web/package.json').dependencies.next"
      pnpm install --frozen-lockfile=false
      pnpm build:web
    acceptance:
      - The repo no longer pins a Next.js version known to be vulnerable for the active App Router security advisories.
      - The selected version is in a patched release line and the lockfile is regenerated.
      - The web app build passes after the dependency update.
      - README includes a short operator note covering redeploy and secret-rotation guidance if the app was exposed while unpatched.

  - id: reconcile-opencode-phase-state
    title: Reconcile backlog, current phase, and command-state so the OpenCode workflow is auditable again
    status: completed
    completion_note: Marked this governance fix complete after reconciling backlog/current-phase state, promoting the next unresolved founder fix into current-phase, and preserving grep-based validation evidence.
    module: .opencode
    priority: 95
    files:
      - .opencode/backlog/candidates.yaml
      - .opencode/plans/current-phase.md
      - .opencode/plans/founder-priority-fixes.md
      - .opencode/commands/phase-status.md
      - .opencode/commands/priority-fixes.md
    validation: |
      grep -n "Candidate ID:" .opencode/plans/current-phase.md
      grep -n "patch-nextjs-security-line" .opencode/backlog/candidates.yaml
      grep -n "reconcile-opencode-phase-state" .opencode/backlog/candidates.yaml
      grep -n "publish-runtime-truth-readme" .opencode/backlog/candidates.yaml
      grep -n "classify-screen-exports-reference" .opencode/backlog/candidates.yaml
    acceptance:
      - The active Candidate ID exists in backlog candidates.
      - The founder priority order is recorded in one durable roadmap file.
      - The phase-status command explicitly checks backlog/current-phase alignment.
      - No stale candidate ID remains as the active phase after the update.

  - id: publish-runtime-truth-readme
    title: Add a current implemented surfaces section and honest runtime limitations to README
    status: completed
    completion_note: Added an audited implemented-surfaces section, separated shell-only flows from future integrations, and explicitly documented missing auth, host pairing, and persistence.
    module: docs
    priority: 90
    files:
      - README.md
      - .opencode/plans/current-phase.md
    validation: |
      grep -n "Current implemented surfaces" README.md
      grep -n "Not implemented yet" README.md
    acceptance:
      - README lists only shipped runtime routes and thin API routes as implemented.
      - README explicitly separates implemented surfaces, placeholder flows, and future integrations.
      - README explicitly notes lack of auth, host pairing, and persistence if those are still not implemented.

  - id: classify-screen-exports-reference
    title: Mark screens exports as design-reference artifacts and prevent them from overstating shipped maturity
    status: completed
    completion_note: Added an explicit screens README caveat and aligned the root README so design exports no longer imply shipped runtime parity.
    module: screens
    priority: 85
    files:
      - screens/README.md
      - README.md
      - .opencode/plans/current-phase.md
    validation: |
      grep -n "design-reference" screens/README.md
      grep -n "screens/" README.md
    acceptance:
      - screens/README.md states that screens exports are design-reference artifacts, not runtime routes.
      - README cross-links to screens with the same caveat.
      - Wording no longer implies parity between screens exports and apps/web runtime implementation.

  - id: hub-mobile-shell
    title: Build the first mobile Hub shell with system status, quick actions, and activity cards
    status: completed
    completion_note: Shipped the mobile Hub shell on `/` with system status, quick actions, workflow summary, host/deploy signals, and recent activity cards.
    module: apps/web
    priority: 10
    files:
      - apps/web/app/page.tsx
      - apps/web/app/globals.css
    validation: pnpm build:web
    acceptance:
      - Home page renders a coherent mobile-first Hub shell.
      - The UI reflects LabFlowDeck status surfaces from SPEC.md.

  - id: projects-list-shell
    title: Add the Projects list shell with empty state and create-project CTA
    status: completed
    completion_note: Shipped the Projects list shell with stacked project cards, summary metrics, and a guided create-project entry path.
    module: apps/web
    priority: 9
    files:
      - apps/web/app/projects/page.tsx
      - apps/web/app/globals.css
    validation: pnpm build:web
    acceptance:
      - Projects page renders stacked project cards or a guided empty state.

  - id: agents-panel-shell
    title: Add the Agents panel shell with workflow cards and run history summary
    status: completed
    completion_note: Shipped the Agents shell with workflow cards, recent run summaries, and a workflow-creation entry point.
    module: apps/web
    priority: 8
    files:
      - apps/web/app/agents/page.tsx
      - apps/web/app/globals.css
    validation: pnpm build:web
    acceptance:
      - Agents page presents workflow cards and a creation entry point.

  - id: deploy-panel-shell
    title: Add the Deploy panel shell with service cards and health badges
    status: completed
    completion_note: Shipped the Deploy shell with project/service status cards, persisted filters, refresh, confirmation-gated actions, and thin API adapter seams.
    module: apps/web
    priority: 8
    files:
      - apps/web/app/deploy/page.tsx
      - apps/web/app/globals.css
    validation: pnpm build:web
    acceptance:
      - Deploy page presents service status with distinct runtime and health indicators.

  - id: web-health-route
    title: Add a thin health endpoint for the web app and surface build metadata
    status: completed
    completion_note: Extended `GET /api/health` with lightweight build metadata while keeping the route bounded to a thin shell-facing contract.
    module: apps/web
    priority: 7
    files:
      - apps/web/app/api/health/route.ts
    validation: pnpm build:web
    acceptance:
      - Health route returns ok status and lightweight metadata.

  - id: decompose-deploy-client-surface
    title: Split the Deploy client into smaller view and helper modules without changing the shell contract
    status: completed
    completion_note: Refactored the Deploy route into smaller helpers and presentation modules while preserving the shell contract and passing the web build.
    module: apps/web
    priority: 6
    files:
      - apps/web/app/deploy/DeployPageClient.tsx
      - apps/web/app/deploy/format.ts
      - apps/web/app/deploy/filters.ts
      - apps/web/app/deploy/presentation.tsx
      - apps/web/app/deploy/types.ts
      - .opencode/plans/current-phase.md
    validation: pnpm build:web
    acceptance:
      - The Deploy route keeps its existing shell behavior and thin API contract.
      - Inline badge, filter, and action-label helpers are extracted from the main client file.
      - The primary Deploy client file becomes materially smaller and easier to audit.
      - The web app build passes after the refactor.

  - id: deploy-service-detail-sheet
    title: Add a mobile service detail sheet to the Deploy route for focused status, logs, and safe actions
    module: apps/web
    priority: 5
    files:
      - apps/web/app/deploy/DeployPageClient.tsx
      - apps/web/app/deploy/presentation.tsx
      - apps/web/app/deploy/types.ts
      - apps/web/app/deploy/format.ts
      - .opencode/plans/current-phase.md
    validation: pnpm build:web
    acceptance:
      - Tapping a service opens a focused mobile detail sheet or panel within the existing Deploy route.
      - The detail surface shows service runtime status, health status, resource usage, recent log preview, and preview URL or ports when present.
      - Existing confirmation-gated deploy actions continue to work from the detail surface without changing the thin API contract.
      - The Deploy route remains mobile-first and the web app build passes.
