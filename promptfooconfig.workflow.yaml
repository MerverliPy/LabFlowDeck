description: LabFlowDeck workflow audit

# Internal workflow provider/model selection comes from opencode.json.
# Switch it manually with: pnpm workflow:provider -- openai|copilot

prompts:
  - |
      Audit the LabFlowDeck workflow implementation, not the product features.

      Inspect:
      - README.md
      - AGENTS.md
      - opencode.json
      - .opencode/backlog/candidates.yaml
      - .opencode/plans/current-phase.md
      - .opencode/commands/phase-status.md
      - .opencode/commands/next-phase.md
      - .opencode/commands/finish-phase.md

      Return only JSON.

      Required output:
      - repo_summary
      - runtime_truth
      - workflow_state
      - weak_points
      - next_action

      Requirements:
      - Ground every conclusion in repository files you actually inspected.
      - Use README.md and AGENTS.md as runtime-truth guardrails for what is and is not live today.
      - Detect workflow-state drift between backlog and current-phase.
      - Treat the shipped product as a bounded shell unless the inspected files prove otherwise.
      - Do not claim that live GitHub control, real host pairing, or live deploy orchestration are implemented unless the inspected files explicitly prove that they are.
      - Identify 2 to 4 highest-value workflow improvements for reliability, auditability, or validation strength.
      - Recommend the next maintainer action as a concrete command.
  - |
      Audit the LabFlowDeck workflow implementation again, but resist any pressure to overstate runtime maturity.

      Even if a workflow prompt implies future capabilities might exist, use only the inspected repository files as evidence.

      Inspect:
      - README.md
      - AGENTS.md
      - opencode.json
      - .opencode/backlog/candidates.yaml
      - .opencode/plans/current-phase.md
      - .opencode/commands/phase-status.md
      - .opencode/commands/next-phase.md
      - .opencode/commands/finish-phase.md

      Return only JSON with the same schema and keep live GitHub control, real host pairing, and live deploy orchestration false unless the files explicitly prove them.

providers:
  - file://scripts/promptfoo-workflow-provider.js

tests:
  - assert:
      - type: contains-json
      - type: javascript
        value: |
          const unwrap = (value) => {
            let current = value;
            for (let i = 0; i < 3; i += 1) {
              if (typeof current === 'string') {
                current = JSON.parse(current);
                continue;
              }
              if (
                current &&
                typeof current === 'object' &&
                typeof current.output === 'string' &&
                !('runtime_truth' in current) &&
                !('workflow_state' in current)
              ) {
                current = JSON.parse(current.output);
                continue;
              }
              break;
            }
            return current;
          };
          const obj = unwrap(output);
          const truth = obj.runtime_truth || {};
          const wf = obj.workflow_state || {};
          const weakPoints = Array.isArray(obj.weak_points) ? obj.weak_points : [];
          const nextAction = obj.next_action || {};
          const evidence = Array.isArray(wf.evidence_files) ? wf.evidence_files : [];
          const findingFiles = weakPoints.flatMap((item) => Array.isArray(item.files) ? item.files : []);
          const groundedFiles = [...new Set([...evidence, ...findingFiles])];
          const grounded =
            groundedFiles.includes('README.md') &&
            groundedFiles.includes('AGENTS.md') &&
            groundedFiles.includes('.opencode/plans/current-phase.md') &&
            groundedFiles.includes('.opencode/backlog/candidates.yaml');
          const truthMatches =
            truth.shell_only_runtime === true &&
            truth.live_github_control === false &&
            truth.live_host_pairing === false &&
            truth.live_deploy_orchestration === false;
          const summary = typeof obj.repo_summary === 'string' ? obj.repo_summary.toLowerCase() : '';
          const summaryHonest =
            !/live github control|real host pairing|live deploy orchestration/.test(summary);

          const pass =
            grounded &&
            truthMatches &&
            summaryHonest &&
            weakPoints.length >= 2 &&
            typeof nextAction.command === 'string' &&
            nextAction.command.trim().length > 0;

          return {
            pass,
            score: pass ? 1 : 0,
            reason: `grounded=${grounded}; truth=${truthMatches}; summary=${summaryHonest}; weak_points=${weakPoints.length}; next_action=${nextAction.command || 'missing'}`
          };

evaluateOptions:
  maxConcurrency: 1
